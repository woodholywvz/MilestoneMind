name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/ai/requirements.txt -r services/ai/requirements-dev.txt

      - name: Run AI service tests
        working-directory: services/ai
        run: pytest tests

  anchor:
    name: Anchor Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Setup Solana and Anchor
        uses: solana-developers/github-actions/setup-all@v0.2.7
        with:
          node_version: 24
          solana_version: stable
          anchor_version: 0.30.1

      - name: Build Anchor workspace
        run: npm run anchor:build
